
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destinos - Agência de Turismo</title>
  <link rel="stylesheet" href="/css/reserva.css">
</head>


<section class="reserva">
  <h1>Faça sua Reserva</h1>
  <p>Preencha os dados para garantir sua viagem</p>

  <form>
    <input type="text" placeholder="Nome completo" required>
    <input type="email" placeholder="E-mail" required>
    <input type="tel" placeholder="Telefone" required>

    <select required>
      <option value="">Escolha o destino</option>
      <option>Rio de Janeiro</option>
      <option>Salvador</option>
      <option>Amazonas</option>
      <option>Foz do Iguaçu</option>
      <option>Fernando de Noronha</option>
    </select>

    <input type="date" required>

    <input type="number" placeholder="Quantidade de pessoas" min="1" required>

    <button type="submit">Confirmar Reserva</button>
  </form>
</section>
